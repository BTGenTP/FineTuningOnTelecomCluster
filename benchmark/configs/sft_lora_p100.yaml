name: nav4rail_sft_lora_p100
task: sft
output_root: runs
method: sft
catalog_path: data/nav4rail_catalog_merged.json
xsd_path: null
model:
  model_name_or_path: mistralai/Mistral-7B-Instruct-v0.3
  # P100 16GB: full fp16 7B + long context OOMs — use 4-bit + shorter seq (raise if VRAM allows).
  dtype: fp16
  quantization: nf4
peft:
  method: lora
  r: 16
  alpha: 32
  dropout: 0.05
  target_modules:
    - q_proj
    - k_proj
    - v_proj
    - o_proj
prompt:
  mode: few_shot
  few_shot_k: 2
  include_schema: true
training:
  output_dir: artifacts/sft_lora
  learning_rate: 0.0002
  batch_size: 1
  gradient_accumulation_steps: 4
  num_train_epochs: 1.0
  max_seq_length: 2048
metadata:
  hardware_profile: p100

name: nav4rail_ppo
task: ppo
output_root: runs/ppo
method: ppo
catalog_path: data/nav4rail_catalog_merged.json
xsd_path: null
model:
  model_name_or_path: mistralai/Mistral-7B-Instruct-v0.3
  dtype: bf16
  quantization: null
peft:
  method: lora
  r: 16
  alpha: 32
  dropout: 0.05
  target_modules:
    - q_proj
    - k_proj
    - v_proj
    - o_proj
  adapter_path: null
prompt:
  mode: zero_shot
  include_schema: true
training:
  output_dir: artifacts/ppo
  learning_rate: 0.00001
  batch_size: 1
  gradient_accumulation_steps: 1
  num_train_epochs: 1.0
generation:
  max_new_tokens: 768
  temperature: 0.8
  top_p: 0.95
  top_k: -1
  do_sample: true

# ReAct / Reflexion PoT agent (iterative Code-as-Reasoning, Python intermediate)
# ==============================================================================
# Invoke with:
#   python -m src.eval.benchmark --config configs/base.yaml --prompt-mode react_pot_agent
#
# LangGraph state machine: generate_code → execute_code → validate → reflect.
# On error OR score < target_score the reflect node re-enters generate_code
# with an error-feedback prompt. Loop bounded by max_iterations.
#
# For the direct-XML variant (no Python intermediate), use --prompt-mode react_base_agent.

training:
  method: "react_pot_agent"

react_pot_agent:
  # Slightly higher than PoT — the refinement loop benefits from exploration.
  temperature: 0.3
  top_p: 0.9
  max_new_tokens: 2048
  sandbox_timeout_s: 10.0

  # Loop control
  max_iterations: 3       # 1 initial + up to 2 refines
  target_score: 1.0       # stop early only on perfect score
  use_langgraph: true     # falls back to plain loop if langgraph isn't installed

eval:
  enrich_ports: true
